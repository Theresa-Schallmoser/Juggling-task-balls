<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let balls = [];

const colors = [
    "#FF5252", "#FF9800", "#FFEB3B",
    "#4CAF50", "#2196F3", "#9C27B0", "#00BCD4"
];

const MAX_BALLS = 6;

// Drag state
let draggingIndex = null;
let offsetX = 0;
let offsetY = 0;

function addBall(text = "") {
    if (balls.length >= MAX_BALLS) {
        alert("Maximal 6 Bälle erlaubt!");
        return;
    }

    const i = balls.length;

    balls.push({
        text: text,
        color: colors[i % colors.length],
        x: 100 + i * 160,
        y: 150,
        scale: 0.2 // für Animation
    });

    renderInputs();
    draw();
}

function deleteBall(index) {
    balls.splice(index, 1);
    renderInputs();
    draw();
}

function updateText(index, value) {
    balls[index].text = value;
    draw();
}

function renderInputs() {
    const container = document.getElementById("inputContainer");
    container.innerHTML = "";

    balls.forEach((ball, i) => {
        const wrapper = document.createElement("div");

        const input = document.createElement("input");
        input.value = ball.text;
        input.placeholder = "Ball " + (i + 1);
        input.oninput = (e) => updateText(i, e.target.value);

        const del = document.createElement("button");
        del.textContent = "❌";
        del.style.marginLeft = "5px";
        del.onclick = () => deleteBall(i);

        wrapper.appendChild(input);
        wrapper.appendChild(del);
        container.appendChild(wrapper);
    });
}

// --- DRAW ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    balls.forEach((ball, i) => {
        // Animation (scale wächst auf 1)
        ball.scale += (1 - ball.scale) * 0.1;

        const radius = 50 * ball.scale;

        // Kreis
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.fill();

        // TEXT (schwarz + Auto-Size)
        ctx.fillStyle = "black";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        let fontSize = 16;
        if (ball.text.length > 12) fontSize = 14;
        if (ball.text.length > 20) fontSize = 12;
        if (ball.text.length > 30) fontSize = 10;

        ctx.font = `${fontSize}px Arial`;

        wrapText(ball.text, ball.x, ball.y, radius * 1.5, fontSize + 2);
    });

    requestAnimationFrame(draw);
}

// --- TEXT WRAP ---
function wrapText(text, x, y, maxWidth, lineHeight) {
    const words = text.split(" ");
    let line = "";
    let lines = [];

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + " ";
        let testWidth = ctx.measureText(testLine).width;

        if (testWidth > maxWidth && n > 0) {
            lines.push(line);
            line = words[n] + " ";
        } else {
            line = testLine;
        }
    }

    lines.push(line);

    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(
            lines[i],
            x,
            y - (lines.length / 2 - i) * lineHeight
        );
    }
}

// --- MOUSE EVENTS (DRAG & DROP) ---
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    balls.forEach((ball, i) => {
        const dx = mx - ball.x;
        const dy = my - ball.y;

        if (Math.sqrt(dx * dx + dy * dy) < 50) {
            draggingIndex = i;
            offsetX = dx;
            offsetY = dy;
        }
    });
});

canvas.addEventListener("mousemove", (e) => {
    if (draggingIndex === null) return;

    const rect = canvas.getBoundingClientRect();
    balls[draggingIndex].x = e.clientX - rect.left - offsetX;
    balls[draggingIndex].y = e.clientY - rect.top - offsetY;
});

canvas.addEventListener("mouseup", () => {
    draggingIndex = null;
});

canvas.addEventListener("mouseleave", () => {
    draggingIndex = null;
});

// Startwerte
addBall("Task 1");
addBall("Task 2");
addBall("Task 3");

// Animation starten
draw();
</script>
