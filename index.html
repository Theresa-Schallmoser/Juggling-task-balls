<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Task Bälle</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
    }

    h2 {
        margin-top: 20px;
    }

    #inputContainer {
        margin: 10px;
    }

    input {
        margin: 5px;
        padding: 8px;
        width: 150px;
        border-radius: 6px;
        border: none;
    }

    button {
        padding: 10px 15px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }

    canvas {
        display: block;
        margin: 20px auto;
        background: #111;
    }
</style>
</head>

<body>

<h2>Meine Aufgaben</h2>

<div id="inputContainer"></div>

<button onclick="addBall()">➕ Ball hinzufügen</button>

<canvas id="canvas" width="1000" height="300"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let balls = [];

const colors = [
    "#FF5252", "#FF9800", "#FFEB3B",
    "#4CAF50", "#2196F3", "#9C27B0", "#00BCD4"
];

const MAX_BALLS = 6;

// Drag state
let draggingIndex = null;
let offsetX = 0;
let offsetY = 0;

function addBall(text = "") {
    if (balls.length >= MAX_BALLS) {
        alert("Maximal 6 Bälle erlaubt!");
        return;
    }

    const i = balls.length;

    balls.push({
        text: text,
        color: colors[i % colors.length],
        x: 100 + i * 160,
        y: 150,
        scale: 0.2
    });

    renderInputs();
}

function deleteBall(index) {
    balls.splice(index, 1);
    renderInputs();
}

function updateText(index, value) {
    balls[index].text = value;
}

function renderInputs() {
    const container = document.getElementById("inputContainer");
    container.innerHTML = "";

    balls.forEach((ball, i) => {
        const wrapper = document.createElement("div");

        const input = document.createElement("input");
        input.value = ball.text;
        input.placeholder = "Ball " + (i + 1);
        input.oninput = (e) => updateText(i, e.target.value);

        const del = document.createElement("button");
        del.textContent = "❌";
        del.onclick = () => deleteBall(i);

        wrapper.appendChild(input);
        wrapper.appendChild(del);
        container.appendChild(wrapper);
    });
}

// DRAW LOOP
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    balls.forEach((ball) => {

        // Animation
        ball.scale += (1 - ball.scale) * 0.1;

        const radius = 50 * ball.scale;

        // Kreis
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.fill();

        // TEXT
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        let fontSize = 14;
        if (ball.text.length > 20) fontSize = 12;
        if (ball.text.length > 30) fontSize = 10;

        ctx.font = `${fontSize}px Arial`;

        wrapText(ball.text, ball.x, ball.y, radius * 1.5, fontSize + 2);
    });

    requestAnimationFrame(draw);
}

// TEXT WRAP (SCHWARZ FIX)
function wrapText(text, x, y, maxWidth, lineHeight) {
    ctx.fillStyle = "black";

    const words = text.split(" ");
    let line = "";
    let lines = [];

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + " ";
        let testWidth = ctx.measureText(testLine).width;

        if (testWidth > maxWidth && n > 0) {
            lines.push(line);
            line = words[n] + " ";
        } else {
            line = testLine;
        }
    }

    lines.push(line);

    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(
            lines[i],
            x,
            y - (lines.length / 2 - i) * lineHeight
        );
    }
}

// DRAG & DROP
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    balls.forEach((ball, i) => {
        const dx = mx - ball.x;
        const dy = my - ball.y;

        if (Math.sqrt(dx * dx + dy * dy) < 50) {
            draggingIndex = i;
            offsetX = dx;
            offsetY = dy;
        }
    });
});

canvas.addEventListener("mousemove", (e) => {
    if (draggingIndex === null) return;

    const rect = canvas.getBoundingClientRect();
    balls[draggingIndex].x = e.clientX - rect.left - offsetX;
    balls[draggingIndex].y = e.clientY - rect.top - offsetY;
});

canvas.addEventListener("mouseup", () => {
    draggingIndex = null;
});

canvas.addEventListener("mouseleave", () => {
    draggingIndex = null;
});

// Start
addBall("Task 1");
addBall("Task 2");
addBall("Task 3");

draw();
</script>

</body>
</html>
