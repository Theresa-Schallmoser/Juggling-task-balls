<script defer>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let balls = [];
let draggingIndex = null;

const colors = ["#FF5252","#FF9800","#FFEB3B","#4CAF50","#2196F3","#9C27B0","#00BCD4"];

function addBall(text = "") {
    balls.push({
        text: text,
        color: colors[balls.length % colors.length]
    });
    renderInputs();
    draw();
}

function updateText(index, value) {
    if (value.trim() === "") {
        balls.splice(index, 1);
    } else {
        balls[index].text = value;
    }
    renderInputs();
    draw();
}

function renderInputs() {
    const container = document.getElementById("inputContainer");
    container.innerHTML = "";

    balls.forEach((ball, i) => {
        const input = document.createElement("input");
        input.value = ball.text;
        input.placeholder = "Ball " + (i+1);
        input.oninput = (e) => updateText(i, e.target.value);
        container.appendChild(input);
    });
}

function getBallX(i) {
    const spacing = 160;
    const startX = 100;
    return startX + i * spacing;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const y = 150;

    balls.forEach((ball, i) => {
        let x = getBallX(i);

        // wenn gezogen → Mausposition
        if (i === draggingIndex) {
            x = currentMouseX;
        }

        ball.currentX = x;

        ctx.beginPath();
        ctx.arc(x, y, 50, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "14px Arial";

        wrapText(ball.text, x, y, 80, 16);
    });
}

function wrapText(text, x, y, maxWidth, lineHeight) {
    const words = text.split(" ");
    let line = "";
    let lines = [];

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + " ";
        let testWidth = ctx.measureText(testLine).width;

        if (testWidth > maxWidth && n > 0) {
            lines.push(line);
            line = words[n] + " ";
        } else {
            line = testLine;
        }
    }
    lines.push(line);

    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], x, y - (lines.length/2 - i) * lineHeight);
    }
}

// 🖱️ Drag Logic
let currentMouseX = 0;

canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const y = 150;

    balls.forEach((ball, i) => {
        const dx = mouseX - getBallX(i);
        const dy = mouseY - y;

        if (Math.sqrt(dx*dx + dy*dy) < 50) {
            draggingIndex = i;
        }
    });
});

canvas.addEventListener("mousemove", (e) => {
    if (draggingIndex !== null) {
        const rect = canvas.getBoundingClientRect();
        currentMouseX = e.clientX - rect.left;
        draw();
    }
});

canvas.addEventListener("mouseup", () => {
    if (draggingIndex !== null) {

        // neue Position berechnen
        const newIndex = Math.round((currentMouseX - 100) / 160);
        const clampedIndex = Math.max(0, Math.min(balls.length - 1, newIndex));

        const movedBall = balls.splice(draggingIndex, 1)[0];
        balls.splice(clampedIndex, 0, movedBall);

        draggingIndex = null;

        renderInputs();
        draw();
    }
});

// Start
addBall();
addBall();
addBall();
</script>
