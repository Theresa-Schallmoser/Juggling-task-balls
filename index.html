<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <title>Task Bälle</title> <style> body { margin: 0; font-family: Arial, sans-serif; background: #111; color: white; text-align: center; } h2 { margin-top: 20px; } #inputContainer { margin: 10px; } input { margin: 5px; padding: 8px; width: 150px; border-radius: 6px; border: none; } button { padding: 10px 15px; margin: 10px; border: none; border-radius: 8px; background: #4CAF50; color: white; cursor: pointer; } canvas { display: block; margin: 20px auto; background: #111; } </style> </head> <body> <h2>Meine Aufgaben</h2> <div id="inputContainer"></div> <button onclick="addBall()">➕ Ball hinzufügen</button> <canvas id="canvas" width="1000" height="300"></canvas> <!-- ✅ SCRIPT IST HIER (WICHTIG!) --> <script> const canvas = document.getElementById("canvas"); const ctx = canvas.getContext("2d"); let balls = []; const colors = [ "#FF5252", "#FF9800", "#FFEB3B", "#4CAF50", "#2196F3", "#9C27B0", "#00BCD4" ]; function addBall(text = "") { balls.push({ text: text, color: colors[balls.length % colors.length] }); renderInputs(); draw(); } function updateText(index, value) { if (value.trim() === "") { balls.splice(index, 1); } else { balls[index].text = value; } renderInputs(); draw(); } function renderInputs() { const container = document.getElementById("inputContainer"); container.innerHTML = ""; balls.forEach((ball, i) => { const input = document.createElement("input"); input.value = ball.text; input.placeholder = "Ball " + (i + 1); input.oninput = (e) => updateText(i, e.target.value); container.appendChild(input); }); } function draw() { ctx.clearRect(0, 0, canvas.width, canvas.height); const spacing = 160; const startX = 100; const y = 150; balls.forEach((ball, i) => { const x = startX + i * spacing; // Kreis ctx.beginPath(); ctx.arc(x, y, 50, 0, Math.PI * 2); ctx.fillStyle = ball.color; ctx.fill(); // Text ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "14px Arial"; wrapText(ball.text, x, y, 80, 16); }); } function wrapText(text, x, y, maxWidth, lineHeight) { const words = text.split(" "); let line = ""; let lines = []; for (let n = 0; n < words.length; n++) { let testLine = line + words[n] + " "; let testWidth = ctx.measureText(testLine).width; if (testWidth > maxWidth && n > 0) { lines.push(line); line = words[n] + " "; } else { line = testLine; } } lines.push(line); for (let i = 0; i < lines.length; i++) { ctx.fillText(lines[i], x, y - (lines.length / 2 - i) * lineHeight); } } // Startwerte addBall("Task 1"); addBall("Task 2"); addBall("Task 3"); </script> </body> </html>
